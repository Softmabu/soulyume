<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #240046);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      margin: 5px;
      cursor: pointer;
      background: #7b2cbf;
      color: white;
    }

    button:hover {
      background: #5a189a;
    }
  </style>
</head>

<body>

<div class="center">
  <div class="box">
    <h2>Soul Yume</h2>

    <input id="username" placeholder="Email">
    <input id="password" type="password" placeholder="Mật khẩu">

    <br>

    <button onclick="login()">Đăng nhập</button>
    <button onclick="register()">Đăng ký</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBFrN2yn6ZFeneuliaZioigM0jomQ9pOUA",
    authDomain: "soul-yume.firebaseapp.com",
    projectId: "soul-yume",
    storageBucket: "soul-yume.firebasestorage.app",
    messagingSenderId: "20530015233",
    appId: "1:20530015233:web:2ec85cbb30a8d053ada400",
    measurementId: "G-ZKP0FZ8MEF"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ĐĂNG KÝ
  window.register = function () {
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Đăng ký thành công 🎉");
      })
      .catch(err => alert(err.message));
  };

  // ĐĂNG NHẬP
  window.login = function () {
    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        window.location.href = "home.html";
      })
      .catch(err => alert(err.message));
  };
</script>

</body>
</html>
