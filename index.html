<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #7209b7;
      color: white;
      cursor: pointer;
    }

    #main {
      display: none;
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <div class="box">
    <h2>Đăng nhập Soul Yume</h2>
    <input id="username" placeholder="Tên người dùng">
    <input id="password" type="password" placeholder="Mật khẩu">
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <h1>Chào mừng 👋</h1>
  <p id="userText"></p>
  <button onclick="logout()">Đăng xuất</button>
</div>

<script>
  function login() {
    const user = document.getElementById("username").value;

    if (user === "") {
      alert("Nhập tên đi 😅");
      return;
    }

    localStorage.setItem("user", user);
    showMain();
  }

  function showMain() {
    const user = localStorage.getItem("user");

    if (user) {
      document.getElementById("login").style.display = "none";
      document.getElementById("main").style.display = "block";
      document.getElementById("userText").innerText = "Xin chào " + user;
    }
  }

  function logout() {
    localStorage.removeItem("user");
    location.reload();
  }

  // tự đăng nhập nếu đã có
  showMain();
</script>

</body>
</html>
