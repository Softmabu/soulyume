<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 150px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #7209b7;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #560bad;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Soul Yume</h1>
    <p>Thế giới trò chuyện và sáng tạo nhân vật của bạn</p>
    <button onclick="alert('Tính năng đang phát triển 👀')">
      Bắt đầu
    </button>
  </div>
</body>
</html>
