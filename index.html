<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #240046);
      color: white;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #c77dff;
    }

    .nav-links a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* Main */
    .main {
      text-align: center;
      margin-top: 120px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      color: #e0aaff;
    }

    p {
      opacity: 0.8;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      border-radius: 12px;
      border: none;
      background: #7b2cbf;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #5a189a;
    }

    /* Card preview */
    .cards {
      display: flex;
      justify-content: center;
      margin-top: 80px;
      gap: 30px;
    }

    .card {
      width: 200px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">Soul Yume</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Characters</a>
      <a href="#">Chat</a>
    </div>
  </div>

  <div class="main">
    <h1>Soul Yume</h1>
    <p>Thế giới sáng tạo, trò chuyện và cảm xúc</p>
    <button class="btn" onclick="alert('Sắp có chat 👀')">
      Bắt đầu
    </button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>💬 Chat</h3>
      <p>Trò chuyện với nhân vật AI</p>
    </div>

    <div class="card">
      <h3>🎭 Character</h3>
      <p>Tạo nhân vật của riêng bạn</p>
    </div>

    <div class="card">
      <h3>🌌 World</h3>
      <p>Khám phá thế giới Soul Yume</p>
    </div>
  </div>

</body>
</html>
