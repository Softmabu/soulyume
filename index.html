<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #240046);
      color: white;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h2 {
      color: #e0aaff;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      margin: 5px;
      cursor: pointer;
      background: #7b2cbf;
      color: white;
    }

    button:hover {
      background: #5a189a;
    }
  </style>
</head>

<body>

<div class="center">
  <div class="box">
    <h2>Soul Yume</h2>

    <input id="username" placeholder="Tên người dùng">
    <input id="password" type="password" placeholder="Mật khẩu">

    <br>

    <button onclick="login()">Đăng nhập</button>
    <button onclick="register()">Đăng ký</button>
  </div>
</div>

<script>
  function register() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "" || pass === "") {
      alert("Nhập đủ thông tin 😅");
      return;
    }

    if (localStorage.getItem("user_" + user)) {
      alert("Tài khoản đã tồn tại 😢");
      return;
    }

    localStorage.setItem("user_" + user, pass);
    alert("Đăng ký thành công 🎉");
  }

  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const savedPass = localStorage.getItem("user_" + user);

    if (savedPass === null) {
      alert("Tài khoản chưa tồn tại 😢");
      return;
    }

    if (savedPass !== pass) {
      alert("Sai mật khẩu 😭");
      return;
    }

    localStorage.setItem("user", user);

    // 👉 chuyển sang trang chủ
    window.location.href = "home.html";
  }
</script>

</body>
</html>
