<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Soul Yume - Home</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #240046);
      color: white;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 22px;
      color: #c77dff;
      font-weight: bold;
    }

    .user {
      cursor: pointer;
    }

    /* Main */
    .main {
      text-align: center;
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
      color: #e0aaff;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 60px;
    }

    .card {
      width: 200px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">Soul Yume</div>
    <div class="user" onclick="logout()">Đăng xuất</div>
  </div>

  <div class="main">
    <h1 id="welcome"></h1>

    <div class="cards">
      <div class="card" onclick="goChat()">
        <h3>💬 Chat</h3>
        <p>Nói chuyện với nhân vật</p>
      </div>

      <div class="card">
        <h3>🎭 Nhân vật</h3>
        <p>Tạo nhân vật của bạn</p>
      </div>

      <div class="card">
        <h3>🌌 Thế giới</h3>
        <p>Khám phá Soul Yume</p>
      </div>
    </div>
  </div>

<script>
  const user = localStorage.getItem("user");

  if (!user) {
    window.location.href = "index.html";
  }

  document.getElementById("welcome").innerText = "Xin chào " + user;

  function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }

  function goChat() {
    alert("Trang chat sẽ làm tiếp 👀");
  }
</script>

</body>
</html>
